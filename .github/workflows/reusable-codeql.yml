# Reusable workflow: CodeQL static analysis.
#
# Call from a caller workflow in a consuming repo:
#
#   jobs:
#     analyze:
#       uses: nyuchi/.github/.github/workflows/reusable-codeql.yml@main
#       with:
#         languages: '[{"language":"javascript-typescript","build-mode":"none"}]'
#
# The caller must grant:
#   actions: read
#   contents: read
#   security-events: write
#   packages: read
#
# The `languages` input is a JSON array of { language, build-mode } objects.
# Valid `language` values: javascript-typescript, python, c-cpp, java-kotlin,
# csharp, go, ruby, swift. Valid `build-mode` values: none, autobuild, manual.

name: Reusable / CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: JSON array of { language, build-mode } objects (see header).
        type: string
        required: true
      queries:
        description: CodeQL query suites to run.
        type: string
        default: "security-extended,security-and-quality"

permissions:
  actions: read
  contents: read
  security-events: write
  packages: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.languages) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: ${{ inputs.queries }}
      - if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          category: "/language:${{ matrix.language }}"
