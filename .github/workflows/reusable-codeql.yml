# Reusable workflow: CodeQL static analysis.
#
# Call from a caller workflow in a consuming repo:
#
#   jobs:
#     analyze:
#       uses: nyuchi/.github/.github/workflows/reusable-codeql.yml@main
#       with:
#         languages: '[{"language":"javascript-typescript","build-mode":"none"}]'
#
# The caller must grant:
#   actions: read
#   contents: read
#   security-events: write
#   packages: read
#
# The `languages` input is a JSON array of { language, build-mode } objects.
# Valid `language` values: javascript-typescript, python, c-cpp, java-kotlin,
# csharp, go, ruby, swift. Valid `build-mode` values: none, autobuild, manual.

name: Reusable / CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: JSON array of { language, build-mode } objects (see header).
        type: string
        required: true
      queries:
        description: CodeQL query suites to run.
        type: string
        default: "security-extended,security-and-quality"

permissions:
  actions: read
  contents: read
  security-events: write
  packages: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.languages) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: ${{ inputs.queries }}
      - if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
        with:
          category: "/language:${{ matrix.language }}"
