# Reusable workflow: Docs / MDX site CI.
#
# Call from a caller workflow in a consuming repo:
#
#   jobs:
#     ci:
#       uses: nyuchi/.github/.github/workflows/reusable-ci-docs-mdx.yml@main
#       with:
#         build-command: "pnpm build"
#
# The caller must grant `contents: read`.

name: Reusable / CI / Docs MDX

on:
  workflow_call:
    inputs:
      build-command:
        description: Shell command that builds the site.
        type: string
        default: "pnpm build"
      node-version-file:
        description: Path to the file pinning the Node version.
        type: string
        default: .nvmrc
      files-glob:
        description: Glob used by cspell and lychee to find content files.
        type: string
        default: "**/*.{md,mdx}"

permissions:
  contents: read

jobs:
  spellcheck:
    name: Spellcheck (cspell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2  # v8
        with:
          incremental_files_only: ${{ github.event_name == 'pull_request' }}
          files: ${{ inputs.files-glob }}

  link-check:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --max-concurrency 8
            --exclude-mail
            './**/*.md'
            './**/*.mdx'
          fail: true

  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
        shell: bash
        run: |
          set -euo pipefail
          bash -c "$BUILD_COMMAND"
