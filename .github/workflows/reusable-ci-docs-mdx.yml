# Reusable workflow: Docs / MDX site CI.
#
# Call from a caller workflow in a consuming repo:
#
#   jobs:
#     ci:
#       uses: nyuchi/.github/.github/workflows/reusable-ci-docs-mdx.yml@main
#       with:
#         build-command: "pnpm build"
#
# The caller must grant `contents: read`.

name: Reusable / CI / Docs MDX

on:
  workflow_call:
    inputs:
      build-command:
        description: Shell command that builds the site.
        type: string
        default: "pnpm build"
      node-version-file:
        description: Path to the file pinning the Node version.
        type: string
        default: .nvmrc
      files-glob:
        description: Glob used by cspell and lychee to find content files.
        type: string
        default: "**/*.{md,mdx}"

permissions:
  contents: read

jobs:
  spellcheck:
    name: Spellcheck (cspell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: streetsidesoftware/cspell-action@v6
        with:
          incremental_files_only: ${{ github.event_name == 'pull_request' }}
          files: ${{ inputs.files-glob }}

  link-check:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --max-concurrency 8
            --exclude-mail
            './**/*.md'
            './**/*.mdx'
          fail: true

  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: ${{ inputs.build-command }}
