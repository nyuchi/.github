# Reusable workflow: CycloneDX SBOM generation.
#
# Generates a Software Bill of Materials in CycloneDX JSON format and
# uploads it as a build artifact. On tagged releases the SBOM is also
# attached to the GitHub release.
#
# Required by NA-03 §7.2 — every production release must ship a
# CycloneDX SBOM.
#
# Call from a release workflow in a consuming repo:
#
#   on:
#     push:
#       tags: ['v*']
#
#   jobs:
#     sbom:
#       uses: nyuchi/.github/.github/workflows/reusable-sbom.yml@main
#       with:
#         artifact-name: sbom-${{ github.ref_name }}
#       permissions:
#         contents: write
#         packages: read
#
# The caller must grant:
#   contents: write  (to attach the SBOM to a release)
#   packages: read   (to inspect package manifests)

name: Reusable / SBOM

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Name for the uploaded SBOM artifact.
        type: string
        default: sbom
      format:
        description: SBOM output format (cyclonedx-json or cyclonedx-xml).
        type: string
        default: cyclonedx-json
      upload-release-assets:
        description: Attach the SBOM to the GitHub release (requires a tagged push).
        type: boolean
        default: true

# Top-level ceiling: direct callers with upload-release-assets:true need
# contents:write to attach the SBOM to a GitHub Release. Sub-workflow
# callers (e.g. reusable-release.yml) should grant only contents:read.
permissions:
  contents: write
  packages: read

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Generate SBOM (anchore/sbom-action)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          format: ${{ inputs.format }}
          artifact-name: ${{ inputs.artifact-name }}.json
          output-file: ${{ inputs.artifact-name }}.json
          upload-artifact: true
          upload-release-assets: ${{ inputs.upload-release-assets }}

      - name: Verify SBOM is non-empty
        env:
          SBOM_FILE: ${{ inputs.artifact-name }}.json
        run: |
          set -euo pipefail
          if [ ! -s "$SBOM_FILE" ]; then
            echo "::error::SBOM file '$SBOM_FILE' is missing or empty — NA-03 §7.2 requires a valid CycloneDX SBOM on every release."
            exit 1
          fi
          # Guard against anchore emitting a syntactically-valid but content-free document.
          components=$(jq '.components // [] | length' "$SBOM_FILE")
          if [ "$components" -eq 0 ]; then
            echo "::error::SBOM '$SBOM_FILE' contains zero components — likely an sbom-action detection failure."
            exit 1
          fi
          echo "SBOM OK: $components components in $SBOM_FILE"
