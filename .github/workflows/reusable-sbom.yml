# Reusable workflow: CycloneDX SBOM generation.
#
# Generates a Software Bill of Materials in CycloneDX JSON format and
# uploads it as a build artifact. On tagged releases the SBOM is also
# attached to the GitHub release.
#
# Required by NA-03 §7.2 — every production release must ship a
# CycloneDX SBOM.
#
# Call from a release workflow in a consuming repo:
#
#   on:
#     push:
#       tags: ['v*']
#
#   jobs:
#     sbom:
#       uses: nyuchi/.github/.github/workflows/reusable-sbom.yml@main
#       with:
#         artifact-name: sbom-${{ github.ref_name }}
#       permissions:
#         contents: write
#         packages: read
#
# The caller must grant:
#   contents: write  (to attach the SBOM to a release)
#   packages: read   (to inspect package manifests)

name: Reusable / SBOM

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Name for the uploaded SBOM artifact.
        type: string
        default: sbom
      format:
        description: SBOM output format (cyclonedx-json or cyclonedx-xml).
        type: string
        default: cyclonedx-json
      upload-release-assets:
        description: Attach the SBOM to the GitHub release (requires a tagged push).
        type: boolean
        default: true

permissions:
  contents: write
  packages: read

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Generate SBOM (anchore/sbom-action)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          format: ${{ inputs.format }}
          artifact-name: ${{ inputs.artifact-name }}.json
          output-file: ${{ inputs.artifact-name }}.json
          upload-artifact: true
          upload-release-assets: ${{ inputs.upload-release-assets }}
