# Reusable workflow: Dependency review.
#
# Call from a caller workflow in a consuming repo:
#
#   jobs:
#     review:
#       uses: nyuchi/.github/.github/workflows/reusable-dependency-review.yml@main
#       with:
#         fail-on-severity: moderate
#
# The caller must grant:
#   contents: read
#   pull-requests: write

name: Reusable / Dependency review

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: Lowest severity that fails the PR (low, moderate, high, critical).
        type: string
        default: moderate
      comment-summary-in-pr:
        description: When to post the summary comment (never, always, on-failure).
        type: string
        default: on-failure

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          comment-summary-in-pr: ${{ inputs.comment-summary-in-pr }}
          fail-on-scopes: runtime, development
