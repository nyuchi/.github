# Reusable workflow: strict lint (the org's standard lint policy).
#
# Call from a caller workflow in any repo under nyuchi:
#
#   name: Lint
#   on:
#     pull_request:
#     push:
#       branches: [main]
#   jobs:
#     lint:
#       uses: nyuchi/.github/.github/workflows/reusable-lint.yml@main
#
# Every job is BLOCKING. The required-status-checks list in your
# repo's main-branch ruleset should include all five job names:
#   actionlint, JSON validity, prettier, markdownlint, yamllint
#
# The reusable does NOT auto-fix anything. When a check fails,
# the developer fixes locally (`prettier --write`,
# `markdownlint-cli2 --fix`, manual yamllint fix) and pushes
# the corrected commit.
#
# Each consuming repo should ship its own .prettierrc,
# .prettierignore, .yamllint.yaml, and .markdownlint.jsonc -
# copy them from nyuchi/.github as a starting point.
# These tools all auto-discover their config from the repo root.
#
# The caller must grant `contents: read` (the workflow default).

name: Reusable / Lint

on:
  workflow_call:
    inputs:
      prettier-glob:
        description: Glob passed to `prettier --check`.
        type: string
        default: "**/*.{md,mdx,json,jsonc}"
      markdownlint-globs:
        description: Newline-separated globs for markdownlint-cli2.
        type: string
        default: |
          **/*.md
          !**/node_modules/**
      yamllint-target:
        description: Path passed to `yamllint`.
        type: string
        default: "."
      actionlint-paths:
        description: Space-separated globs for actionlint.
        type: string
        default: ".github/workflows/*.yml"
      prettier-version:
        type: string
        default: "3.3.3"
      yamllint-version:
        type: string
        default: "1.35.1"

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Download actionlint
        id: get_actionlint
        shell: bash
        run: |
          set -euo pipefail
          installer=$(mktemp)
          trap 'rm -f "$installer"' EXIT
          curl --fail --silent --show-error --location \
            --retry 3 --retry-delay 2 \
            https://raw.githubusercontent.com/rhysd/actionlint/v1.7.4/scripts/download-actionlint.bash \
            --output "$installer"
          # Sanity-check we got a shell script, not an HTML error page.
          head -n 1 "$installer" | grep -qE '^#!.*(bash|sh)' \
            || { echo "::error::actionlint installer did not look like a shell script"; head -n 5 "$installer"; exit 1; }
          bash "$installer" 1.7.4
      - name: actionlint
        env:
          ACTIONLINT_BIN: ${{ steps.get_actionlint.outputs.executable }}
          ACTIONLINT_PATHS: ${{ inputs.actionlint-paths }}
        shell: bash
        run: |
          set -euo pipefail
          # Intentional word-splitting: $ACTIONLINT_PATHS is a space-separated glob list.
          # shellcheck disable=SC2086
          "$ACTIONLINT_BIN" -color $ACTIONLINT_PATHS

  jsonlint:
    name: JSON validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Validate every *.json file
        run: |
          set -euo pipefail
          status=0
          while IFS= read -r -d '' file; do
            if ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$file"; then
              echo "::error file=$file::invalid JSON"
              status=1
            fi
          done < <(find . -name '*.json' -not -path './node_modules/*' -print0)
          exit "$status"

  prettier:
    name: prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '20'
      - name: Install prettier
        env:
          PRETTIER_VERSION: ${{ inputs.prettier-version }}
        shell: bash
        run: |
          set -euo pipefail
          # Validate version to guard against injection via inputs.prettier-version.
          if [[ ! "$PRETTIER_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Invalid prettier-version '$PRETTIER_VERSION' — expected semver."
            exit 1
          fi
          npm install --global "prettier@$PRETTIER_VERSION"
      - name: prettier --check
        env:
          PRETTIER_GLOB: ${{ inputs.prettier-glob }}
        shell: bash
        run: |
          set -euo pipefail
          prettier --check "$PRETTIER_GLOB"

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9  # v23
        with:
          globs: ${{ inputs.markdownlint-globs }}

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install yamllint
        env:
          YAMLLINT_VERSION: ${{ inputs.yamllint-version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$YAMLLINT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Invalid yamllint-version '$YAMLLINT_VERSION' — expected semver."
            exit 1
          fi
          pip install "yamllint==$YAMLLINT_VERSION"
      - name: yamllint (strict)
        env:
          YAMLLINT_TARGET: ${{ inputs.yamllint-target }}
        shell: bash
        run: |
          set -euo pipefail
          # Intentional word-splitting: $YAMLLINT_TARGET may be a space-separated list of paths.
          # shellcheck disable=SC2086
          yamllint -s -f github $YAMLLINT_TARGET
