# Reusable workflow: OpenTofu / Terraform IaC CI.
#
# Runs format check, validation, and a plan on every PR.
# Optionally runs a Trivy IaC security scan (enabled by default).
# Satisfies the "planned — Terraform IaC" item in ORG_SETTINGS.md §Enforcement.
#
# Call from a caller workflow in a consuming repo:
#
#   name: IaC
#   on:
#     pull_request:
#     push:
#       branches: [main]
#       paths: ['infra/**', '.github/workflows/iac.yml']
#
#   jobs:
#     iac:
#       uses: nyuchi/.github/.github/workflows/reusable-ci-opentofu.yml@main
#       with:
#         working-directory: infra/
#         tofu-version: "1.9"
#       secrets:
#         TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
#       permissions:
#         contents: read
#         pull-requests: write
#         security-events: write
#
# Caller permissions
# ------------------
#   contents: read        always required
#   pull-requests: write  required to post the plan comment on PRs
#   security-events: write required for the Trivy IaC SARIF upload
#
# Inputs
# ------
# working-directory  Directory containing the root .tf / .tofu files (default: .).
# tofu-version       OpenTofu version to install (default: latest stable).
# scan               Run Trivy IaC security scan (default: true).
# scan-severity      Trivy severity threshold (default: CRITICAL,HIGH).
#
# Secrets
# -------
# TF_API_TOKEN  HCP Terraform / Terraform Cloud API token. Optional — only
#               needed if your backend is Terraform Cloud / HCP Terraform.

name: Reusable / CI / OpenTofu

on:
  workflow_call:
    inputs:
      working-directory:
        description: Root directory of the .tf / .tofu configuration.
        type: string
        default: "."
      tofu-version:
        description: |
          OpenTofu version to install (e.g. "1.9", "latest").
          Pin to a specific version for reproducible CI.
        type: string
        default: "latest"
      scan:
        description: Run Trivy IaC security scan and upload SARIF.
        type: boolean
        default: true
      scan-severity:
        description: Comma-separated Trivy severity levels that fail CI.
        type: string
        default: "CRITICAL,HIGH"
    secrets:
      TF_API_TOKEN:
        description: HCP Terraform / Terraform Cloud API token. Optional.
        required: false

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Job 1: format check + validate (always runs).
  # -------------------------------------------------------------------------
  validate:
    name: fmt + validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # TODO(supply-chain): pin opentofu/setup-opentofu to SHA.
      # Run: gh api repos/opentofu/setup-opentofu/git/refs/tags/v1 --jq '.object.sha'
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ inputs.tofu-version }}

      - name: tofu fmt --check
        working-directory: ${{ inputs.working-directory }}
        run: tofu fmt -check -recursive

      - name: tofu init (no backend)
        working-directory: ${{ inputs.working-directory }}
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: tofu init -backend=false -input=false

      - name: tofu validate
        working-directory: ${{ inputs.working-directory }}
        run: tofu validate

  # -------------------------------------------------------------------------
  # Job 2: Trivy IaC scan — misconfiguration and secret detection.
  # -------------------------------------------------------------------------
  scan:
    name: Trivy IaC scan
    needs: validate
    if: inputs.scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # TODO(supply-chain): pin aquasecurity/trivy-action to SHA.
      - name: Trivy IaC + secret scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: config
          scan-ref: ${{ inputs.working-directory }}
          format: sarif
          output: trivy-iac.sarif
          severity: ${{ inputs.scan-severity }}
          exit-code: "1"

      - name: Upload Trivy IaC SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  # -------------------------------------------------------------------------
  # Job 3: tofu plan — runs on PRs only, posts a comment with the output.
  # -------------------------------------------------------------------------
  plan:
    name: tofu plan
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ inputs.tofu-version }}
          tofu_wrapper: true  # captures stdout/stderr for the plan comment

      - name: tofu init
        working-directory: ${{ inputs.working-directory }}
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: tofu init -input=false

      - name: tofu plan
        id: plan
        working-directory: ${{ inputs.working-directory }}
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: tofu plan -no-color -input=false
        continue-on-error: true

      # TODO(supply-chain): pin actions/github-script to SHA.
      - name: Post plan summary to PR
        uses: actions/github-script@v7
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          PLAN_STDERR: ${{ steps.plan.outputs.stderr }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const outcome = process.env.PLAN_OUTCOME;
            const stdout = process.env.PLAN_STDOUT || '';
            const stderr = process.env.PLAN_STDERR || '';
            const icon = outcome === 'success' ? '✅' : '❌';
            const truncate = (s, n) => s.length > n ? s.slice(0, n) + '\n…(truncated)' : s;
            const body = [
              `#### ${icon} OpenTofu Plan \`${outcome}\``,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```hcl',
              truncate(stdout, 60000),
              '```',
              stderr ? `\n**Errors / warnings:**\n\`\`\`\n${truncate(stderr, 2000)}\n\`\`\`` : '',
              '</details>',
              '',
              `*Workflow: \`${context.workflow}\` · Run [#${context.runNumber}](` +
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
                `/actions/runs/${context.runId})*`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            if (outcome === 'failure') core.setFailed('tofu plan failed — see comment above.');
