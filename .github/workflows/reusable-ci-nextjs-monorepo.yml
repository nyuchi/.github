# Reusable workflow: Next.js monorepo CI (Turborepo + pnpm).
#
# Call from a caller workflow in a consuming repo:
#
#   jobs:
#     ci:
#       uses: nyuchi/.github/.github/workflows/reusable-ci-nextjs-monorepo.yml@main
#       with:
#         tasks: "lint typecheck test build"
#       secrets:
#         TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
#         TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
#
# The caller must grant `contents: read`.

name: Reusable / CI / Next.js monorepo

on:
  workflow_call:
    inputs:
      tasks:
        description: Space-separated list of turbo tasks to run (matrixed one job per task).
        type: string
        default: "lint typecheck test build"
      node-version-file:
        description: Path to the file pinning the Node version.
        type: string
        default: .nvmrc
    secrets:
      TURBO_TOKEN:
        description: Turborepo Remote Cache token. Optional.
        required: false
      TURBO_TEAM:
        description: Turborepo Remote Cache team slug. Optional.
        required: false

permissions:
  contents: read

jobs:
  matrix:
    name: resolve matrix
    runs-on: ubuntu-latest
    outputs:
      tasks: ${{ steps.split.outputs.tasks }}
    steps:
      - id: split
        env:
          TASKS: ${{ inputs.tasks }}
        shell: bash
        run: |
          set -euo pipefail
          # Split on whitespace intentionally — $TASKS is a space-separated list.
          # shellcheck disable=SC2086
          json=$(printf '%s\n' $TASKS | jq -R . | jq -c -s .)
          if [ -z "$json" ] || [ "$json" = "[]" ]; then
            echo "::error::inputs.tasks ('$TASKS') resolved to an empty matrix."
            exit 1
          fi
          echo "tasks=$json" >> "$GITHUB_OUTPUT"

  ci:
    name: ${{ matrix.task }}
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.matrix.outputs.tasks) }}
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_FILTER: >-
        ${{ github.event_name == 'pull_request'
            && format('...[{0}]', github.event.pull_request.base.sha)
            || '...[HEAD^1]' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: turbo run ${{ matrix.task }}
        env:
          TURBO_TASK: ${{ matrix.task }}
        shell: bash
        run: |
          set -euo pipefail
          # Validate to guard against a caller passing injection via inputs.tasks.
          if [[ ! "$TURBO_TASK" =~ ^[a-zA-Z0-9_:.-]+$ ]]; then
            echo "::error::Invalid turbo task name '$TURBO_TASK' — must match [a-zA-Z0-9_:.-]+."
            exit 1
          fi
          pnpm turbo run "$TURBO_TASK" --filter="$TURBO_FILTER"
