# Reusable workflow: Rust monorepo CI (Cargo workspace).
#
# Call from a caller workflow in a consuming repo:
#
#   jobs:
#     ci:
#       uses: nyuchi/.github/.github/workflows/reusable-ci-rust-monorepo.yml@main
#       with:
#         toolchain: stable
#
# The caller must grant `contents: read`.

name: Reusable / CI / Rust monorepo

on:
  workflow_call:
    inputs:
      toolchain:
        description: Rust toolchain to install (stable, beta, nightly, 1.85, etc.).
        type: string
        default: stable

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain'
              - 'rust-toolchain.toml'
              - '.github/workflows/**'

  fmt:
    name: cargo fmt
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # dtolnay/rust-toolchain publishes no semver tags; # master is a moving branch ref.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: ${{ inputs.toolchain }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # dtolnay/rust-toolchain publishes no semver tags; # master is a moving branch ref.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: ${{ inputs.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: cargo nextest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # dtolnay/rust-toolchain publishes no semver tags; # master is a moving branch ref.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: ${{ inputs.toolchain }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      # taiki-e/install-action uses per-tool moving tags rather than semver.
      - uses: taiki-e/install-action@dfd6a81ff1efc1c100332d760e0c9edfe2ae0a51  # nextest
      - run: cargo nextest run --workspace --all-features
      - name: doctests
        run: cargo test --workspace --doc

  build:
    name: cargo build
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # dtolnay/rust-toolchain publishes no semver tags; # master is a moving branch ref.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: ${{ inputs.toolchain }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo build --workspace --all-features --release

  doc:
    name: cargo doc
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # dtolnay/rust-toolchain publishes no semver tags; # master is a moving branch ref.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: ${{ inputs.toolchain }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo doc --workspace --all-features --no-deps
