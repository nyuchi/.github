# Reusable workflow: Container (Docker / OCI) CI.
#
# Builds an OCI image, scans it with Trivy, and optionally pushes and
# signs it with cosign keyless signing. Covers NA-03 §7.1 (supply-chain
# hygiene) and §7.2 (SBOM / container provenance).
#
# Call from a caller workflow in a consuming repo:
#
#   jobs:
#     container:
#       uses: nyuchi/.github/.github/workflows/reusable-ci-container.yml@main
#       with:
#         image-name: ghcr.io/nyuchi/my-service
#         push: ${{ github.event_name != 'pull_request' }}
#       secrets:
#         REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
#       permissions:
#         contents: read
#         packages: write
#         id-token: write
#         security-events: write
#
# Caller permissions
# ------------------
#   contents: read         always required
#   packages: write        required when push: true (GHCR)
#   id-token: write        required for cosign keyless signing
#   security-events: write required for Trivy SARIF upload
#
# Inputs
# ------
# image-name      Full OCI image name (e.g. ghcr.io/nyuchi/my-service). Required.
# context         Docker build context path (default: .).
# dockerfile      Path to the Dockerfile (default: ./Dockerfile).
# push            Push the image after a successful scan (default: false).
# platforms       Comma-separated OCI platforms for the push build.
#                 On PRs only linux/amd64 is built for speed.
# sign            Sign the pushed image with cosign (default: true).
# scan-severity   Trivy severity levels that fail CI (default: CRITICAL,HIGH).

name: Reusable / CI / Container

on:
  workflow_call:
    inputs:
      image-name:
        description: Full OCI image name (e.g. ghcr.io/nyuchi/my-service).
        type: string
        required: true
      context:
        description: Docker build context directory.
        type: string
        default: "."
      dockerfile:
        description: Path to the Dockerfile.
        type: string
        default: "./Dockerfile"
      push:
        description: Push image to the registry after a successful scan.
        type: boolean
        default: false
      platforms:
        description: |
          Comma-separated OCI platforms for the push build.
          Only linux/amd64 is built on PR runs regardless of this input.
        type: string
        default: "linux/amd64,linux/arm64"
      sign:
        description: |
          Sign the pushed image digest with cosign keyless signing.
          Skipped automatically on pull_request events.
        type: boolean
        default: true
      scan-severity:
        description: |
          Comma-separated Trivy severity levels that cause CI to fail.
          Set to "" to report without failing.
        type: string
        default: "CRITICAL,HIGH"
    secrets:
      REGISTRY_PASSWORD:
        description: |
          Registry credential (e.g. secrets.GITHUB_TOKEN for GHCR).
          Only required when push: true.
        required: false

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Job 1: build (linux/amd64), scan, then optionally push multi-platform.
  # -------------------------------------------------------------------------
  build-scan:
    name: Build + Trivy scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      # Step A: always build linux/amd64 and load it locally for Trivy.
      - name: Build (linux/amd64, local load for scan)
        id: build-local
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Trivy vulnerability scan (local image)
        id: trivy
        if: inputs.scan-severity != ''
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # 0.36.0
        with:
          image-ref: ${{ inputs.image-name }}
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.scan-severity }}
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF to GitHub Security tab
        if: inputs.scan-severity != '' && always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      # Step B: multi-platform push (only on non-PR push events).
      - name: Build & push (multi-platform)
        id: push
        if: inputs.push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # -------------------------------------------------------------------------
  # Job 2: cosign keyless signing — runs only after a successful push.
  # -------------------------------------------------------------------------
  sign:
    name: Sign image (cosign keyless)
    needs: build-scan
    if: >-
      inputs.sign
      && inputs.push
      && github.event_name != 'pull_request'
      && needs.build-scan.outputs.digest != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # OIDC token for cosign keyless signing
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Sign image digest
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_DIGEST: ${{ needs.build-scan.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE_NAME}@${IMAGE_DIGEST}"
          echo "Signed ${IMAGE_NAME}@${IMAGE_DIGEST}"
