# Org-wide CI template: Docs / MDX sites
#
# Intended for repositories whose primary artefact is documentation or
# content authored in Markdown / MDX — e.g. `docs`, `zti-docs`,
# `support`.
#
# What it runs on every PR and push to main:
#   1. Spellcheck (cspell) — incremental on PRs, full on main.
#   2. Link check (lychee) — catches broken internal and external links.
#   3. Site build — delegates to the repo's own `pnpm build` script.
#
# Assumptions about the target repo:
#   - Node-based static site generator (Astro, Starlight, Next.js,
#     Docusaurus, etc.) with a `build` script in package.json.
#   - pnpm workspace with a lockfile.
#   - `.nvmrc` at the repo root pinning the Node version.
#   - Optional `cspell.json` at the repo root for custom dictionaries.
#
# Repos that use a non-Node toolchain (e.g. mdBook, Hugo, Jekyll)
# should replace the `build` job with their own.

name: CI (Docs / MDX)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  spellcheck:
    name: Spellcheck (cspell)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v6
        with:
          incremental_files_only: ${{ github.event_name == 'pull_request' }}
          files: "**/*.{md,mdx}"

  link-check:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --max-concurrency 8
            --exclude-mail
            './**/*.md'
            './**/*.mdx'
          fail: true

  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
