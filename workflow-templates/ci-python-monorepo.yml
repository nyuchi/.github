# Org-wide CI template: Python monorepo (uv workspace)
#
# Assumptions about the target repo:
#   - Root pyproject.toml with [tool.uv.workspace] members = ["packages/*"]
#   - Root uv.lock (committed)
#   - Per-package source lives under packages/<name>/
#   - .python-version file at the repo root pins the Python version uv should use
#   - ruff, mypy, pytest declared as dev dependencies in the root pyproject.toml

name: CI (Python monorepo)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      any_python: ${{ steps.filter.outputs.any_python }}
      root_changed: ${{ steps.filter.outputs.root_changed }}
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            any_python:
              - '**/*.py'
              - '**/pyproject.toml'
              - 'uv.lock'
              - '.python-version'
              - '.github/workflows/**'
            root_changed:
              - 'pyproject.toml'
              - 'uv.lock'
              - '.python-version'

      - name: Compute affected packages
        id: packages
        env:
          ROOT_CHANGED: ${{ steps.filter.outputs.root_changed }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          NULL_SHA="0000000000000000000000000000000000000000"
          all_packages() {
            if [ -d packages ]; then
              find packages -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort
            fi
          }

          # If there's no usable base (new branch, manual dispatch) or the
          # root workspace config changed, treat every package as affected.
          if [ "$ROOT_CHANGED" = "true" ] \
             || [ -z "$BASE_SHA" ] \
             || [ "$BASE_SHA" = "$NULL_SHA" ]; then
            mapfile -t pkgs < <(all_packages)
          else
            mapfile -t pkgs < <(
              git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
                | awk -F/ '$1=="packages" && NF>2 {print $2}' \
                | sort -u
            )
          fi

          json=$(printf '%s\n' "${pkgs[@]}" | jq -R . | jq -c -s 'map(select(length>0))')
          echo "packages=$json" >> "$GITHUB_OUTPUT"
          echo "Affected packages: $json"

  lint:
    name: ruff check
    needs: changes
    if: needs.changes.outputs.any_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-packages --frozen
      - run: uv run ruff check .

  format:
    name: ruff format --check
    needs: changes
    if: needs.changes.outputs.any_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-packages --frozen
      - run: uv run ruff format --check .

  typecheck:
    name: mypy
    needs: changes
    if: needs.changes.outputs.any_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-packages --frozen
      - run: uv run mypy packages

  test:
    name: pytest (${{ matrix.package }})
    needs: changes
    if: needs.changes.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-packages --frozen
      - name: pytest ${{ matrix.package }}
        run: uv run --package ${{ matrix.package }} pytest packages/${{ matrix.package }}
