# Org-wide workflow template: Pull request title lint
#
# Enforces Conventional Commits format on every PR title. The PR title
# is what squash-merges use as the commit message on `main`, so getting
# it right matters for release-notes automation.
#
# This workflow does NOT check out the PR branch and does NOT run any
# third-party code from forks; it only reads the title metadata from
# the event payload. That's why `pull_request_target` is safe here.

name: PR title lint

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read
  statuses: write

jobs:
  lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep this list in sync with CONTRIBUTING.md § Allowed types.
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
            style

          # Scope is optional but strongly encouraged in monorepos.
          requireScope: false

          # Subject rules: no leading capital letter, no trailing period,
          # at least 1 char after the colon.
          subjectPattern: ^(?![A-Z])[^.]+[^. ]$
          subjectPatternError: |
            The subject "{subject}" in the PR title "{title}" doesn't
            match our subject rule. Start the subject with a lowercase
            letter, write an imperative verb ("add", not "Added" or
            "Adds"), and do not end with a period.

          # Allow "WIP:" draft PRs to pass lint without a type.
          wip: true
